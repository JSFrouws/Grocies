<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumbo Store Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner-large"></div>
        <div class="loading-text">Inloggen via browser...</div>
    </div>

    <!-- Basket Sidebar -->
    <div id="basket-overlay" class="basket-overlay"></div>
    <div id="basket-sidebar" class="basket-sidebar">
        <div class="basket-sidebar-header">
            <h2>🛒 Mijn Basket</h2>
            <button id="close-basket-btn" class="btn-close">✕</button>
        </div>
        <div id="basket-content" class="basket-sidebar-content"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>🛒 Jumbo Store Management</h1>
            <div id="user-info" class="user-info"></div>
        </header>

        <!-- Login Section -->
        <div id="login-section" class="section">
            <h2>Login to Your Jumbo Account</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Email:</label>
                    <input type="email" id="username" name="username" required placeholder="your-email@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="remember" name="remember" checked>
                        Remember my credentials
                    </label>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary">
                    <span class="spinner" style="display: none;"></span>
                    <span class="btn-text">Login</span>
                </button>
            </form>
        </div>

        <!-- Main App Section (hidden until logged in) -->
        <div id="app-section" class="section hidden">
            <!-- Action Bar (top) -->
            <div class="action-bar">
                <button id="view-basket-btn" class="btn btn-secondary">
                    <span class="basket-icon">🛒</span>
                    <span>View Basket</span>
                    <span id="basket-count" class="basket-count hidden">0</span>
                </button>
                <button id="logout-btn" class="btn btn-danger">Logout</button>
            </div>

            <!-- Search Section -->
            <div class="search-section">
                <h2>Search Products</h2>
                <form id="search-form">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Search for products (e.g., 'melk', 'brood', 'kaas')" required>
                        <button type="submit" class="btn btn-primary">Search</button>
                    </div>
                </form>
            </div>

            <!-- Search Results -->
            <div id="search-results" class="results-section">
                <h3>Search Results</h3>
                <div id="products-grid" class="products-grid"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
