<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtrij - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="queue.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Maaltijd Wachtrij</h1>
            <div style="display:flex;gap:10px">
                <button class="btn btn-secondary" onclick="addRandomRecipe()">Willekeurig toevoegen</button>
                <a href="/shopping-list/" class="btn btn-primary">Boodschappenlijst</a>
            </div>
        </div>

        <div id="queue-info" class="queue-info mb-20"></div>

        <!-- Stock filter -->
        <div class="stock-filter mb-20">
            <label class="checkbox-label">
                <input type="checkbox" id="stock-filter-checkbox" onchange="toggleStockFilter()">
                Toon alleen recepten met ingredi&euml;nten uit voorraad
            </label>
        </div>

        <!-- Queue List -->
        <div id="queue-list" class="queue-list"></div>

        <!-- History -->
        <div class="mt-20">
            <h2 style="margin-bottom:16px">Recente geschiedenis</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="/shared/units.js"></script>
    <script src="queue.js"></script>
</body>
</html>
