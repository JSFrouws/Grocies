<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winkel - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="store.css">
</head>
<body>
    <div class="page-container">
        <!-- Login Section -->
        <div id="login-section" class="card hidden">
            <h2>Inloggen bij Jumbo</h2>
            <p class="text-muted mb-20">Vul je Jumbo accountgegevens in om producten te zoeken en je mandje te beheren.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">E-mail</label>
                    <input type="email" id="username" name="username" required placeholder="je-email@voorbeeld.nl">
                </div>
                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <input type="password" id="password" name="password" required placeholder="Voer je wachtwoord in">
                </div>
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="remember" name="remember" checked>
                        Gegevens onthouden
                    </label>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary">
                    <span class="spinner hidden"></span>
                    <span class="btn-text">Inloggen</span>
                </button>
            </form>
        </div>

        <!-- Store Section -->
        <div id="store-section" class="hidden">
            <div class="section-header">
                <h1>Winkel</h1>
                <div style="display:flex;gap:10px;align-items:center">
                    <span id="user-info" class="text-muted"></span>
                    <button id="logout-btn" class="btn btn-danger btn-small">Uitloggen</button>
                </div>
            </div>

            <!-- Search -->
            <div class="search-bar mb-20">
                <input type="search" id="search-input" placeholder="Zoek producten (bijv. 'melk', 'brood', 'kaas')">
                <button id="search-btn" class="btn btn-primary">Zoeken</button>
            </div>

            <!-- Results -->
            <div id="products-grid" class="products-grid"></div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="store.js"></script>
</body>
</html>
