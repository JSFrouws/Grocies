<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Shopping List</h1>
            <div style="display:flex;gap:10px">
                <button class="btn btn-secondary" onclick="exportAsText()">Export Text</button>
                <button class="btn btn-primary" id="add-to-basket-btn" onclick="addAllToBasket()">Add to Basket</button>
            </div>
        </div>

        <!-- Summary -->
        <div id="summary" class="summary-bar mb-20"></div>

        <!-- Recipes in Queue -->
        <div id="recipes-in-list" class="mb-20"></div>

        <!-- Mapped Items -->
        <div id="mapped-section" class="mb-20">
            <h2 class="mb-10">Mapped Ingredients</h2>
            <div id="mapped-items"></div>
        </div>

        <!-- Unmapped Items -->
        <div id="unmapped-section" class="mb-20 hidden">
            <h2 class="mb-10">Unmapped Ingredients</h2>
            <p class="text-muted mb-10">These ingredients need to be mapped to Jumbo products before they can be added to your basket.</p>
            <div id="unmapped-items"></div>
            <a href="/mappings/" class="btn btn-secondary mt-10">Map Ingredients</a>
        </div>

        <!-- Progress Modal -->
        <div id="progress-modal" class="modal-overlay">
            <div class="modal" style="max-width:500px">
                <div class="modal-header">
                    <h2>Adding to Basket</h2>
                </div>
                <div class="modal-body">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <p id="progress-text" class="text-center mt-10">Preparing...</p>
                    <div id="progress-results" class="mt-20 hidden"></div>
                </div>
                <div class="modal-footer hidden" id="progress-footer">
                    <button class="btn btn-primary" onclick="closeModal('progress-modal')">Done</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="shopping-list.js"></script>
</body>
</html>
