<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koppelingen - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="mappings.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Ingredi&euml;ntkoppelingen</h1>
            <button class="btn btn-primary" onclick="openMappingForm()">Koppeling aanmaken</button>
        </div>

        <!-- Unmapped Alert -->
        <div id="unmapped-alert" class="unmapped-alert hidden mb-20">
            <span id="unmapped-count"></span>
            <button class="btn btn-secondary btn-small" onclick="showUnmapped()">Koppel ongekoppeld</button>
        </div>

        <!-- Unmapped Ingredients List -->
        <div id="unmapped-list" class="unmapped-list hidden mb-20"></div>

        <!-- Filter -->
        <div class="search-bar mb-20">
            <input type="search" id="mapping-search" placeholder="Zoek op ingredi&euml;ntnaam...">
        </div>

        <!-- Mappings Table -->
        <div class="table-wrapper">
            <table class="data-table" id="mappings-table">
                <thead>
                    <tr>
                        <th>Ingredi&euml;nt</th>
                        <th>Jumbo Product</th>
                        <th>Verpakking</th>
                        <th>Status</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="mappings-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Mapping Modal -->
    <div id="mapping-form-modal" class="modal-overlay">
        <div class="modal" style="max-width:800px">
            <div class="modal-header">
                <h2 id="mapping-form-title">Koppeling aanmaken</h2>
                <button class="btn-close" onclick="closeModal('mapping-form-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="mapping-id">

                <div class="form-group">
                    <label>Ingredi&euml;ntnaam</label>
                    <input type="text" id="mapping-ingredient" placeholder="bijv. kipfilet" required>
                </div>

                <!-- Similar Mappings Suggestions -->
                <div id="similar-mappings" class="similar-mappings hidden mb-10"></div>

                <!-- Product Search -->
                <div class="form-group">
                    <label>Zoek Jumbo Product</label>
                    <div class="search-bar">
                        <input type="search" id="product-search" placeholder="Zoek producten...">
                        <button class="btn btn-secondary" onclick="searchJumboProducts()">Zoeken</button>
                    </div>
                </div>

                <!-- Search Results -->
                <div id="product-results" class="product-results hidden"></div>

                <!-- Selected Product -->
                <div id="selected-product" class="selected-product hidden">
                    <h3 class="mb-10">Geselecteerd product</h3>
                    <div id="selected-product-info" class="selected-product-info"></div>
                    <input type="hidden" id="mapping-sku">
                    <input type="hidden" id="mapping-product-id">
                    <input type="hidden" id="mapping-product-details">
                </div>

                <!-- Package Info -->
                <div style="display:flex;gap:10px;margin-top:10px">
                    <div class="form-group" style="flex:1">
                        <label>Verpakkingshoeveelheid</label>
                        <input type="number" id="mapping-package-amount" placeholder="bijv. 500" step="any">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Eenheid verpakking</label>
                        <select id="mapping-package-unit">
                            <option value="">Eenheid</option>
                            <option value="L">L</option>
                            <option value="mL">mL</option>
                            <option value="g">g</option>
                            <option value="kg">kg</option>
                            <option value="stuks">stuks</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Houdbaarheid (dagen)</label>
                        <input type="number" id="mapping-shelf-life" placeholder="bijv. 7">
                    </div>
                </div>

                <div class="form-group checkbox mt-10">
                    <label>
                        <input type="checkbox" id="mapping-preferred" checked>
                        Voorkeurskoppeling (gebruikt voor boodschappenlijst)
                    </label>
                </div>
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="mapping-skip">
                        Standaard overslaan in boodschappenlijst (bijv. kruiden, basisproducten)
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('mapping-form-modal')">Annuleren</button>
                <button class="btn btn-primary" onclick="saveMapping()">Opslaan</button>
            </div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="/shared/units.js"></script>
    <script src="mappings.js"></script>
</body>
</html>
