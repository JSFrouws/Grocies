<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappings - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="mappings.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Ingredient Mappings</h1>
            <button class="btn btn-primary" onclick="openMappingForm()">Create Mapping</button>
        </div>

        <!-- Unmapped Alert -->
        <div id="unmapped-alert" class="unmapped-alert hidden mb-20">
            <span id="unmapped-count"></span>
            <button class="btn btn-secondary btn-small" onclick="showUnmapped()">View Unmapped</button>
        </div>

        <!-- Filter -->
        <div class="search-bar mb-20">
            <input type="search" id="mapping-search" placeholder="Filter by ingredient name...">
        </div>

        <!-- Mappings Table -->
        <div class="table-wrapper">
            <table class="data-table" id="mappings-table">
                <thead>
                    <tr>
                        <th>Ingredient</th>
                        <th>Jumbo Product</th>
                        <th>SKU</th>
                        <th>Preferred</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="mappings-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Mapping Modal -->
    <div id="mapping-form-modal" class="modal-overlay">
        <div class="modal" style="max-width:800px">
            <div class="modal-header">
                <h2 id="mapping-form-title">Create Mapping</h2>
                <button class="btn-close" onclick="closeModal('mapping-form-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="mapping-id">

                <div class="form-group">
                    <label>Ingredient Name</label>
                    <input type="text" id="mapping-ingredient" placeholder="e.g. chicken breast" required>
                </div>

                <!-- Product Search -->
                <div class="form-group">
                    <label>Search Jumbo Product</label>
                    <div class="search-bar">
                        <input type="search" id="product-search" placeholder="Search products...">
                        <button class="btn btn-secondary" onclick="searchJumboProducts()">Search</button>
                    </div>
                </div>

                <!-- Search Results -->
                <div id="product-results" class="product-results hidden"></div>

                <!-- Selected Product -->
                <div id="selected-product" class="selected-product hidden">
                    <h3 class="mb-10">Selected Product</h3>
                    <div id="selected-product-info" class="selected-product-info"></div>
                    <input type="hidden" id="mapping-sku">
                    <input type="hidden" id="mapping-product-id">
                    <input type="hidden" id="mapping-product-details">
                </div>

                <div class="form-group checkbox mt-10">
                    <label>
                        <input type="checkbox" id="mapping-preferred" checked>
                        Preferred mapping (used for shopping list)
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('mapping-form-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveMapping()">Save Mapping</button>
            </div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="mappings.js"></script>
</body>
</html>
