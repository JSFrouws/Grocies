<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="recipes.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Recipes</h1>
            <div style="display:flex;gap:10px">
                <button class="btn btn-secondary" onclick="openGenerateModal()">Generate Recipe</button>
                <button class="btn btn-primary" onclick="openRecipeForm()">Create Recipe</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar mb-20">
            <input type="search" id="recipe-search" placeholder="Search recipes..." class="filter-input">
            <select id="cuisine-filter" class="filter-select">
                <option value="">All Cuisines</option>
            </select>
            <select id="country-filter" class="filter-select">
                <option value="">All Countries</option>
            </select>
        </div>

        <!-- Recipe Grid -->
        <div id="recipe-grid" class="grid grid-3"></div>
    </div>

    <!-- Recipe Form Modal -->
    <div id="recipe-form-modal" class="modal-overlay">
        <div class="modal" style="max-width:800px">
            <div class="modal-header">
                <h2 id="form-title">Create Recipe</h2>
                <button class="btn-close" onclick="closeModal('recipe-form-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="recipe-form">
                    <input type="hidden" id="recipe-id">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                        <div class="form-group">
                            <label>Name *</label>
                            <input type="text" id="recipe-name" required>
                        </div>
                        <div class="form-group">
                            <label>Cuisine</label>
                            <input type="text" id="recipe-cuisine" placeholder="e.g. Italian">
                        </div>
                        <div class="form-group">
                            <label>Country of Origin</label>
                            <input type="text" id="recipe-country" placeholder="e.g. Italy">
                        </div>
                        <div class="form-group">
                            <label>Servings</label>
                            <input type="number" id="recipe-servings" value="4" min="1" max="20">
                        </div>
                        <div class="form-group">
                            <label>Prep Time (min)</label>
                            <input type="number" id="recipe-prep" min="0">
                        </div>
                        <div class="form-group">
                            <label>Cook Time (min)</label>
                            <input type="number" id="recipe-cook" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tags (comma-separated)</label>
                        <input type="text" id="recipe-tags" placeholder="e.g. quick, healthy, vegetarian">
                    </div>

                    <div class="form-group">
                        <label>Frequency Weight</label>
                        <div style="display:flex;align-items:center;gap:10px">
                            <input type="range" id="recipe-weight" min="0.5" max="2.0" step="0.1" value="1.0"
                                   style="flex:1" oninput="document.getElementById('weight-val').textContent=this.value">
                            <span id="weight-val" style="min-width:30px">1.0</span>
                        </div>
                        <small class="text-muted">Higher = more likely to be randomly selected</small>
                    </div>

                    <!-- Image Upload -->
                    <div class="form-group">
                        <label>Recipe Image</label>
                        <input type="file" id="recipe-image" accept="image/jpeg,image/png,image/webp">
                        <small class="text-muted">Max 5MB. JPG, PNG, or WebP.</small>
                        <div id="image-preview" class="hidden" style="margin-top:8px">
                            <img id="image-preview-img" style="max-width:200px;border-radius:8px">
                        </div>
                    </div>

                    <!-- Ingredients -->
                    <div class="form-group">
                        <label>Ingredients *</label>
                        <div id="ingredients-list"></div>
                        <button type="button" class="btn btn-secondary btn-small mt-10" onclick="addIngredientRow()">+ Add Ingredient</button>
                    </div>

                    <!-- Instructions -->
                    <div class="form-group">
                        <label>Instructions *</label>
                        <textarea id="recipe-instructions" rows="6" required placeholder="Step-by-step cooking instructions..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('recipe-form-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveRecipe()">Save Recipe</button>
            </div>
        </div>
    </div>

    <!-- Generate Recipe Modal -->
    <div id="generate-modal" class="modal-overlay">
        <div class="modal" style="max-width:500px">
            <div class="modal-header">
                <h2>Generate Recipe</h2>
                <button class="btn-close" onclick="closeModal('generate-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-20">Select a country to generate an authentic recipe using AI.</p>
                <div class="form-group">
                    <label>Country</label>
                    <select id="generate-country" style="width:100%">
                        <option value="">Loading countries...</option>
                    </select>
                </div>
                <button class="btn btn-secondary btn-small mb-20" onclick="randomCountry()">Random Country</button>
                <div class="form-group">
                    <label>Anything specific?</label>
                    <input type="text" id="generate-instructions" placeholder="e.g. vegetarian, uses rice, spicy, quick...">
                </div>
                <div id="generate-status" class="hidden">
                    <div style="display:flex;align-items:center;gap:10px;padding:20px;background:var(--bg-dark);border-radius:8px">
                        <div class="spinner"></div>
                        <span id="generate-status-text">Generating recipe...</span>
                    </div>
                </div>
                <div id="generate-raw" class="hidden">
                    <h3 class="mb-10">Raw LLM Response</h3>
                    <p class="text-muted mb-10">Failed to parse JSON. You can copy and manually adjust:</p>
                    <textarea id="generate-raw-text" rows="10" style="width:100%"></textarea>
                    <button class="btn btn-secondary btn-small mt-10" onclick="copyRaw()">Copy to Clipboard</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('generate-modal')">Cancel</button>
                <button id="generate-btn" class="btn btn-primary" onclick="generateRecipe()">Generate</button>
            </div>
        </div>
    </div>

    <!-- Recipe Detail Modal -->
    <div id="recipe-detail-modal" class="modal-overlay">
        <div class="modal" style="max-width:700px">
            <div class="modal-header">
                <h2 id="detail-title"></h2>
                <button class="btn-close" onclick="closeModal('recipe-detail-modal')">&times;</button>
            </div>
            <div class="modal-body" id="detail-body"></div>
            <div class="modal-footer" id="detail-footer"></div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="recipes.js"></script>
</body>
</html>
