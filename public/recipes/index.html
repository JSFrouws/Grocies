<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepten - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="recipes.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Recepten</h1>
            <div style="display:flex;gap:10px">
                <button class="btn btn-secondary" onclick="openGenerateModal()">Recept genereren</button>
                <button class="btn btn-primary" onclick="openRecipeForm()">Recept aanmaken</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar mb-20">
            <input type="search" id="recipe-search" placeholder="Zoek recepten..." class="filter-input">
            <select id="cuisine-filter" class="filter-select">
                <option value="">Alle keukens</option>
            </select>
            <select id="country-filter" class="filter-select">
                <option value="">Alle landen</option>
            </select>
        </div>

        <!-- Recipe Grid -->
        <div id="recipe-grid" class="grid grid-3"></div>
    </div>

    <!-- Recipe Form Modal -->
    <div id="recipe-form-modal" class="modal-overlay">
        <div class="modal" style="max-width:800px">
            <div class="modal-header">
                <h2 id="form-title">Recept aanmaken</h2>
                <button class="btn-close" onclick="closeModal('recipe-form-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="recipe-form">
                    <input type="hidden" id="recipe-id">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                        <div class="form-group">
                            <label>Naam *</label>
                            <input type="text" id="recipe-name" required>
                        </div>
                        <div class="form-group">
                            <label>Keuken</label>
                            <input type="text" id="recipe-cuisine" placeholder="bijv. Italiaans">
                        </div>
                        <div class="form-group">
                            <label>Land van herkomst</label>
                            <input type="text" id="recipe-country" placeholder="bijv. Itali&euml;">
                        </div>
                        <div class="form-group">
                            <label>Porties</label>
                            <input type="number" id="recipe-servings" value="4" min="1" max="20">
                        </div>
                        <div class="form-group">
                            <label>Bereidingstijd (min)</label>
                            <input type="number" id="recipe-prep" min="0">
                        </div>
                        <div class="form-group">
                            <label>Kooktijd (min)</label>
                            <input type="number" id="recipe-cook" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Tags (kommagescheiden)</label>
                        <input type="text" id="recipe-tags" placeholder="bijv. snel, gezond, vegetarisch">
                    </div>

                    <div class="form-group">
                        <label>Frequentiegewicht</label>
                        <div style="display:flex;align-items:center;gap:10px">
                            <input type="range" id="recipe-weight" min="0.5" max="2.0" step="0.1" value="1.0"
                                   style="flex:1" oninput="document.getElementById('weight-val').textContent=this.value">
                            <span id="weight-val" style="min-width:30px">1.0</span>
                        </div>
                        <small class="text-muted">Hoger = vaker willekeurig geselecteerd</small>
                    </div>

                    <!-- Image Upload -->
                    <div class="form-group">
                        <label>Afbeelding</label>
                        <input type="file" id="recipe-image" accept="image/jpeg,image/png,image/webp">
                        <small class="text-muted">Max 5MB. JPG, PNG of WebP.</small>
                        <div id="image-preview" class="hidden" style="margin-top:8px">
                            <img id="image-preview-img" style="max-width:200px;border-radius:8px">
                        </div>
                    </div>

                    <!-- Ingredients -->
                    <div class="form-group">
                        <label>Ingredi&euml;nten *</label>
                        <div id="ingredients-list"></div>
                        <button type="button" class="btn btn-secondary btn-small mt-10" onclick="addIngredientRow()">+ Ingredi&euml;nt toevoegen</button>
                    </div>

                    <!-- Instructions -->
                    <div class="form-group">
                        <label>Bereidingswijze *</label>
                        <textarea id="recipe-instructions" rows="6" required placeholder="Stapsgewijze bereidingsinstructies..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('recipe-form-modal')">Annuleren</button>
                <button class="btn btn-primary" onclick="saveRecipe()">Opslaan</button>
            </div>
        </div>
    </div>

    <!-- Generate Recipe Modal -->
    <div id="generate-modal" class="modal-overlay">
        <div class="modal" style="max-width:500px">
            <div class="modal-header">
                <h2>Recept genereren</h2>
                <button class="btn-close" onclick="closeModal('generate-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-20">Selecteer een land om een authentiek recept te genereren met AI.</p>
                <div class="form-group">
                    <label>Land</label>
                    <select id="generate-country" style="width:100%">
                        <option value="">Landen laden...</option>
                    </select>
                </div>
                <button class="btn btn-secondary btn-small mb-20" onclick="randomCountry()">Willekeurig land</button>
                <div class="form-group">
                    <label>Specifieke wensen?</label>
                    <input type="text" id="generate-instructions" placeholder="bijv. vegetarisch, met rijst, pittig, snel...">
                </div>
                <div id="generate-status" class="hidden">
                    <div style="display:flex;align-items:center;gap:10px;padding:20px;background:var(--bg-dark);border-radius:8px">
                        <div class="spinner"></div>
                        <span id="generate-status-text">Recept genereren...</span>
                    </div>
                </div>
                <div id="generate-raw" class="hidden">
                    <h3 class="mb-10">Ruwe LLM respons</h3>
                    <p class="text-muted mb-10">JSON kon niet worden verwerkt. Je kunt het kopi&euml;ren en handmatig aanpassen:</p>
                    <textarea id="generate-raw-text" rows="10" style="width:100%"></textarea>
                    <button class="btn btn-secondary btn-small mt-10" onclick="copyRaw()">Kopi&euml;ren naar klembord</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('generate-modal')">Annuleren</button>
                <button id="generate-btn" class="btn btn-primary" onclick="generateRecipe()">Genereren</button>
            </div>
        </div>
    </div>

    <!-- Recipe Detail Modal -->
    <div id="recipe-detail-modal" class="modal-overlay">
        <div class="modal" style="max-width:700px">
            <div class="modal-header">
                <h2 id="detail-title"></h2>
                <button class="btn-close" onclick="closeModal('recipe-detail-modal')">&times;</button>
            </div>
            <div class="modal-body" id="detail-body"></div>
            <div class="modal-footer" id="detail-footer"></div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="/shared/units.js"></script>
    <script src="recipes.js"></script>
</body>
</html>
