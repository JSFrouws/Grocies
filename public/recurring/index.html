<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaste Boodschappen - Grocies</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="recurring.css">
</head>
<body>
    <div class="page-container">
        <div class="section-header">
            <h1>Vaste Boodschappen</h1>
            <button class="btn btn-primary" onclick="openItemForm()">Item toevoegen</button>
        </div>

        <p class="page-description">Wekelijkse boodschappen die automatisch op je boodschappenlijst komen. Kies een product uit je koppelingen en stel het aantal in.</p>

        <!-- Items list -->
        <div id="items-list" class="items-list"></div>
        <div id="empty-state" class="empty-state hidden">
            <p>Nog geen vaste boodschappen ingesteld.</p>
            <p>Voeg items toe die je elke week nodig hebt!</p>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="item-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Item toevoegen</h2>
                <button class="btn-close" onclick="closeItemForm()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">

                <!-- Mapping autocomplete -->
                <div class="form-group">
                    <label for="mapping-search">Product (uit koppelingen) *</label>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="mapping-search" placeholder="Begin te typen..." autocomplete="off">
                        <div id="autocomplete-list" class="autocomplete-list hidden"></div>
                    </div>
                    <input type="hidden" id="selected-mapping-id">
                    <div id="selected-mapping" class="selected-mapping hidden"></div>
                </div>

                <div class="form-row-half">
                    <div class="form-group">
                        <label for="item-quantity">Aantal</label>
                        <input type="number" id="item-quantity" value="1" min="1" oninput="updateTotalDisplay()">
                    </div>
                    <div class="form-group">
                        <label for="item-rate">Frequentie</label>
                        <select id="item-rate" onchange="updateTotalDisplay()">
                            <option value="weekly">Wekelijks</option>
                            <option value="biweekly">Om de week</option>
                            <option value="monthly">Maandelijks</option>
                        </select>
                    </div>
                </div>
                <div class="total-display" id="total-display"></div>

                <div class="form-row-single">
                    <div class="form-group">
                        <label for="item-category">Categorie</label>
                        <select id="item-category">
                            <option value="">-- Kies --</option>
                            <option value="Zuivel">Zuivel</option>
                            <option value="Brood & Ontbijt">Brood & Ontbijt</option>
                            <option value="Snacks">Snacks</option>
                            <option value="Dranken">Dranken</option>
                            <option value="Groente & Fruit">Groente & Fruit</option>
                            <option value="Vlees & Vis">Vlees & Vis</option>
                            <option value="Huishouden">Huishouden</option>
                            <option value="Overig">Overig</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeItemForm()">Annuleren</button>
                <button class="btn btn-primary" onclick="saveItem()">Opslaan</button>
            </div>
        </div>
    </div>

    <script src="/shared/utils.js"></script>
    <script src="recurring.js"></script>
</body>
</html>
